name: run tests
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - name: install dependencies
        run: go get ./...
      - name: verify
        run: go mod verify
      - name: build
        run: go build -v ./...
      - name: test
        run: go test ./...
